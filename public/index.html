<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Metric Fund Backtester</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <aside class="sidebar">
          <div class="app-title">
            <span class="mark">MF</span>
            <div>
              <h1>Metric Fund</h1>
              <p>Backtest builder</p>
            </div>
          </div>

          <div class="panel">
            <div class="panel-heading">
              <h2>Base Numbers</h2>
              <input id="metric-search" type="search" placeholder="Search" />
            </div>
            <div id="base-metrics" class="metric-list"></div>
          </div>
        </aside>

        <section class="main">
          <div class="topbar">
            <div>
              <h2>Build A Fund Rule</h2>
              <p>Define metrics, filter stocks, and roll positions as each company reports new data.</p>
            </div>
            <button id="run" class="primary">Run Backtest</button>
          </div>

          <div class="grid">
            <section class="panel">
              <div class="panel-heading">
                <h2>Custom Metrics</h2>
                <button id="add-metric" class="ghost">Add</button>
              </div>
              <div id="custom-metrics" class="stack"></div>
            </section>

            <section class="panel">
              <div class="panel-heading">
                <h2>Conditions</h2>
                <button id="add-condition" class="ghost">Add</button>
              </div>
              <div id="conditions" class="stack"></div>
              <div class="settings">
                <label>
                  Min revenue
                  <input id="min-revenue" type="number" value="1000000000" min="0" step="100000000" />
                </label>
              </div>
            </section>
          </div>

          <section class="panel saved-panel">
            <div class="panel-heading">
              <h2>Saved Backtests</h2>
              <div class="save-controls">
                <input id="save-name" type="text" placeholder="Backtest name" />
                <button id="save-backtest" class="ghost" disabled>Save</button>
              </div>
            </div>
            <div id="saved-backtests" class="saved-list"></div>
          </section>

          <section class="panel results">
            <div class="result-head">
              <div>
                <h2>Fund Value</h2>
                <p id="summary">Run a backtest to see the curve.</p>
              </div>
              <div id="stats" class="stats"></div>
            </div>
            <canvas id="chart" width="1100" height="360"></canvas>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h2>Period Detail</h2>
            </div>
            <div id="period-list" class="period-list"></div>
          </section>
        </section>
      </section>
    </main>
    <script src="/script.js"></script>
  </body>
</html>
